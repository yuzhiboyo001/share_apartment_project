services:
  # MySQL 数据库
  db:
    image: mysql:8.0
    container_name: apartment_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: shared_apartment
    volumes:
      - ./shared_apartment.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped

  # Spring Boot 后端
  backend-spring:
    build: ./springboot_Apartment
    container_name: apartment_springboot
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=shared_apartment
      - DB_USER=root
      - DB_PASSWORD=123456
    depends_on:
      - db
    restart: unless-stopped

  # FastAPI + RAG 服务
  backend-fastapi:
    build: ./fastapi_AI
    container_name: apartment_fastapi
    ports:
      - "8000:8000"
    volumes:
      - ./fastapi_AI/test_docs:/app/test_docs
      - ./fastapi_AI/chroma_db:/app/chroma_db
      
    environment:
      - OLLAMA_HOST=http://ollama:11434
# fastapi_AI/.env里配置云端API密钥（不添加则可以调用本地模型Ollama模型）
    env_file:
      - fastapi_AI/.env
    depends_on:
      - db
    restart: unless-stopped

  # Ollama 服务（如需本地模型）
  ollama:
    image: ollama/ollama:latest
    container_name: apartment_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # Vue 前端
  frontend:
    build: ./vue_Apartment
    container_name: apartment_frontend
    ports:
      - "80:80"
    depends_on:
      - backend-spring
      - backend-fastapi
    restart: unless-stopped

volumes:
  mysql_data:
  ollama_data: